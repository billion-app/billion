packages:
  - apps/*
  - packages/*
  - tooling/*

catalog:
  "@clack/prompts": 1.7.0
  "@better-auth/cli": 1.4.21
  "@better-auth/expo": 1.6.13
  "@eslint/js": ^10.0.1
  "@tailwindcss/postcss": ^4.2.2
  "@tanstack/react-form": ^1.28.5
  "@tanstack/react-query": ^5.95.2
  "@trpc/client": ^11.16.0
  "@trpc/server": ^11.16.0
  "@trpc/tanstack-react-query": ^11.16.0
  better-auth: 1.6.13
  eslint: ^10.1.0
  prettier: ^3.8.1
  tailwindcss: ^4.2.2
  typescript: ~6.0.3
  yargs: ^18.0.0
  zod: 4.3.6

catalogs:
  react19:
    "@types/react": ^19.2.14
    "@types/react-dom": ^19.2.3
    react: 19.2.3
    react-dom: 19.2.3

linkWorkspacePackages: true

onlyBuiltDependencies:
  - esbuild

overrides:
  react: 19.2.3
  react-dom: 19.2.3
  "@types/minimatch": 5.1.2
  esbuild@<=0.24.2: ">=0.25.0"
  file-type@>=13.0.0 <21.3.1: ">=21.3.1"
  file-type@>=20.0.0 <=21.3.1: ">=21.3.2"
  lightningcss: 1.30.1
  lodash@>=4.0.0 <=4.17.22: ">=4.17.23"
  chalk: "4.1.2"
  markdown-it@<14.1.1: ">=14.1.1"
  yaml@>=2.0.0 <2.8.3: ">=2.8.3"
  # Pin to last 0.28.x: @better-auth/kysely-adapter@1.6.x imports
  # DEFAULT_MIGRATION_TABLE, which kysely 0.29 removed. 0.28.17 keeps the
  # export and still satisfies the security floor. core only needs kysely types.
  kysely: "0.28.17"
  valibot@>=0.31.0 <1.2.0: ">=1.2.0"
  uuid@<11.1.1: ">=11.1.1"
  ws@>=8.0.0 <8.20.1: ">=8.20.1"
  ajv@>=7.0.0 <8.18.0: ">=8.18.0"
  defu@<=6.1.4: ">=6.1.5"
  fast-uri@<=3.1.1: ">=3.1.2"
  "@xmldom/xmldom@<0.8.13": "0.8.13"
  brace-expansion@>=5.0.0 <5.0.6: ">=5.0.6"
  postcss@<8.5.10: ">=8.5.10"
  better-auth@<1.6.13: ">=1.6.13"
  drizzle-orm@<0.45.2: ">=0.45.2"

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss
